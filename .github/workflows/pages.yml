name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site/adr _site/api
          # Convert docs to site structure
          cp docs/index.md _site/index.md
          cp docs/PHYSICS.md _site/physics.md
          cp docs/GOVERNANCE.md _site/governance.md
          cp -r docs/adr/* _site/adr/ 2>/dev/null || true
          cp -r docs/api/* _site/api/ 2>/dev/null || true
          # Add navigation header to index
          cat README.md >> _site/index.md

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
