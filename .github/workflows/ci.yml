name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-engine:
    name: Rust physics engine
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: crates/sonic-ct
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/sonic-ct

      - name: Rustfmt
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --release --lib -- -D warnings

      - name: Tests (physics gates)
        run: cargo test --release

  governance-gates:
    name: MetaBioHacker governance gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/metabiohacker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm ci

      - name: Governance tests
        run: npm test
